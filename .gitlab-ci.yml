image: docker:latest

variables:
  DOCKER_HOST: unix:///var/run/docker.sock

stages:
  - test
  - build

# Runner checkout hardening:
# this runner has intermittent failures fetching ephemeral refs/pipelines/* refs.
# Use fresh clone + full history + prune to avoid stale cached refs.
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  GIT_FETCH_EXTRA_FLAGS: "--prune"

default:
  interruptible: true

# .NET validation job (university/shared runners by default)
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  # Skip this job when:
  # - We're in a merge request pipeline (uni runners currently unreliable/out-of-space)
  # - Self-hosted fallback is explicitly enabled
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$USE_SELF_HOSTED == "true"'
      when: never
    - when: on_success
  before_script:
    # Quick disk telemetry to debug runner space issues.
    - df -h .
    - dotnet --version
  script:
    # Restore dependencies for all projects
    - dotnet restore ese1.sln
    # Build the solution
    - dotnet build ese1.sln --no-restore --configuration Release
    # Run tests
    - dotnet test ese1.sln --no-build --configuration Release --verbosity normal
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  allow_failure: false

# Self-hosted fallback job (runs on your runner tag)
test_selfhosted:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  tags:
    - docker-build
  # Behaviour:
  # - In merge request pipelines: show as a manual "play" job (explicit, avoids false greens)
  # - In branch/manual pipelines: run automatically if USE_SELF_HOSTED=true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - if: '$USE_SELF_HOSTED == "true"'
      when: on_success
    - when: never
  before_script:
    - df -h .
    - dotnet --version
  script:
    # Restore dependencies for all projects
    - dotnet restore ese1.sln
    # Build the solution
    - dotnet build ese1.sln --no-restore --configuration Release
    # Run tests
    - dotnet test ese1.sln --no-build --configuration Release --verbosity normal
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  allow_failure: false


build:
  stage: build
  tags: 
    - docker-build
  # Behaviour:
  # - In merge request pipelines: show as a manual "play" job (explicit, avoids false greens)
  # - In branch/manual pipelines: run automatically if USE_SELF_HOSTED=true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - if: '$USE_SELF_HOSTED == "true"'
      when: on_success
    - when: never
  script:
    - echo "Building rag_backend image..."
    - docker build -t rag_backend:latest ./dotnet-backend

    - echo "Building documentation_generator image..."
    - docker build -t documentation_generator:latest ./documentation_generator

    - echo "Building pac_cli image..."
    - docker build -t pac_cli:latest ./pac-cli





