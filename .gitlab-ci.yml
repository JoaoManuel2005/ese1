image: docker:24.0.5
 
services:
- docker:24.0.5-dind

stages:
  - build

build:
  stage: build
  script:
    - echo "Building rag_backend image..."
    - docker build -t rag_backend:latest ./rag_backend
    - docker save rag_backend:latest -o rag_backend.tar

    - echo "Building documentation_generator image..."
    - docker build -t documentation_generator:latest ./documentation_generator
    - docker save documentation_generator:latest -o documentation_generator.tar

    - echo "Building pac_cli image..."
    - docker build -t pac_cli:latest ./pac_cli
    - docker save pac_cli:latest -o pac_cli.tar

  artifacts:
    name: "docker-images-$CI_COMMIT_SHORT_SHA"
    paths:
      - rag_backend.tar
      - documentation_generator.tar
      - pac_cli.tar
    expire_in: 1 week

  tags:
    - docker

