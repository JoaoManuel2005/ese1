image: docker:latest

variables:
  DOCKER_HOST: unix:///var/run/docker.sock

stages:
  - test
  - build

# Runner checkout hardening:
# this runner has intermittent failures fetching ephemeral refs/pipelines/* refs.
# Use fresh clone + full history + prune to avoid stale cached refs.
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  GIT_FETCH_EXTRA_FLAGS: "--prune"

default:
  interruptible: true

# Python validation job (university/shared runners by default)
test:
  stage: test
  image: python:3.9
  # Skip this job when:
  # - We're in a merge request pipeline (uni runners currently unreliable/out-of-space)
  # - Self-hosted fallback is explicitly enabled
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$USE_SELF_HOSTED == "true"'
      when: never
    - when: on_success
  variables:
    # Avoid pip wheel caching to prevent runner disk exhaustion
    # ("no space left on device"), especially from large ML wheels.
    PIP_NO_CACHE_DIR: "1"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  before_script:
    # Quick disk telemetry to debug runner space issues.
    - df -h .
    - pip install --no-cache-dir --upgrade pip
    # Install only CI dependencies (avoids ML/GPU packages like torch/CUDA).
    - pip install --no-cache-dir -r requirements-ci.txt
    - df -h .
    - python -m pip check
    - |
        python - <<'PY'
        import importlib.util, sys
        ok = importlib.util.find_spec("torch") is None
        if ok:
            print("OK: torch not installed in lightweight CI")
        else:
            print("ERROR: torch is installed in lightweight CI; remove it from CI deps and keep ML deps in requirements-ml.txt or backend image instead")
        sys.exit(0 if ok else 1)
        PY
  script:
    - python --version
    # Repository-wide syntax/import bytecode compilation check.
    - python -m compileall .
    - pytest -q
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  allow_failure: false

# Self-hosted fallback job (runs on your runner tag)
test_selfhosted:
  stage: test
  image: python:3.9
  tags:
    - docker-build
  # Behaviour:
  # - In merge request pipelines: show as a manual "play" job (explicit, avoids false greens)
  # - In branch/manual pipelines: run automatically if USE_SELF_HOSTED=true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - if: '$USE_SELF_HOSTED == "true"'
      when: on_success
    - when: never
  variables:
    PIP_NO_CACHE_DIR: "1"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  before_script:
    - df -h .
    - pip install --no-cache-dir --upgrade pip
    - pip install --no-cache-dir -r requirements-ci.txt
    - df -h .
    - python -m pip check
    - |
        python - <<'PY'
        import importlib.util, sys
        ok = importlib.util.find_spec("torch") is None
        print("OK: torch not installed in lightweight CI" if ok else "ERROR: torch installed in lightweight CI")
        sys.exit(0 if ok else 1)
        PY
  script:
    - python --version
    - python -m compileall .
    - pytest -q
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  allow_failure: false


build:
  stage: build
  tags: 
    - docker-build
  # Behaviour:
  # - In merge request pipelines: show as a manual "play" job (explicit, avoids false greens)
  # - In branch/manual pipelines: run automatically if USE_SELF_HOSTED=true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - if: '$USE_SELF_HOSTED == "true"'
      when: on_success
    - when: never
  script:
    - echo "Building rag_backend image..."
    - docker build -t rag_backend:latest ./rag_backend

    - echo "Building documentation_generator image..."
    - docker build -t documentation_generator:latest ./documentation_generator

    - echo "Building pac_cli image..."
    - docker build -t pac_cli:latest ./pac-cli





