image: docker:24.0.5
 
services:
- docker:24.0.5-dind

stages:
  - build

build:
  stage: build
  script:
    - echo "Logging into container registry"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    
    - echo "Building rag_backend image..."
    - docker build -t $CI_REGISTRY_IMAGE/rag_backend:latest ./rag_backend
    - docker push $CI_REGISTRY_IMAGE/rag_backend:latest

    - echo "Building documentation_generator image..."
    - docker build -t $CI_REGISTRY_IMAGE/documentation_generator:latest ./documentation_generator
    - docker push $CI_REGISTRY_IMAGE/documentation_generator:latest

    - echo "Building pac_cli image..."
    - docker build -t $CI_REGISTRY_IMAGE/pac_cli:latest ./pac_cli
    - docker push $CI_REGISTRY_IMAGE/pac_cli:latest
