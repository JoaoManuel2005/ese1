# Development Docker Compose
# Use: docker-compose -f docker-compose.dev.yml up --build

services:
  # RAG Backend - Python FastAPI service (development mode)
  rag-backend:
    build:
      context: ./rag_backend
      dockerfile: Dockerfile
    container_name: rag-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.generated
    environment:
      - PYTHONUNBUFFERED=1
      - CLEAR_DB_ON_START=${CLEAR_DB_ON_START:-false}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o-mini}
    volumes:
      # Mount source code for hot reload in development
      - ./rag_backend:/app
      # Persist ChromaDB data
      - rag_chroma_data_dev:/app/rag_chroma_db
    networks:
      - docgen-network-dev
    # Use reload for development
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  # Documentation Generator - Next.js frontend (development mode)
  documentation-generator:
    build:
      context: ./documentation_generator
      dockerfile: Dockerfile.dev
    container_name: documentation-generator-dev
    ports:
      - "3000:3000"
    env_file:
      - .env.generated
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - RAG_BACKEND_URL=http://rag-backend:8000
      # NextAuth settings
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # Azure AD OAuth settings
    volumes:
      # Mount source code for hot reload
      - ./documentation_generator:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - rag-backend
    networks:
      - docgen-network-dev
    restart: unless-stopped

networks:
  docgen-network-dev:
    driver: bridge

volumes:
  rag_chroma_data_dev:
    driver: local
