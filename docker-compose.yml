services:
  # RAG Backend - Python FastAPI service
  rag-backend:
    build:
      context: ./rag_backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CLEAR_DB_ON_START=${CLEAR_DB_ON_START:-false}
      # LLM Provider settings
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      # Model settings
      - LLM_PROVIDER=${LLM_PROVIDER:-cloud}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o-mini}
      # Local LLM (Ollama) settings - use host network to access Ollama on host
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3.1:8b}
    volumes:
      # Persist ChromaDB data
      - rag_chroma_data:/app/rag_chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - docgen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Documentation Generator - Next.js frontend
  documentation-generator:
    build:
      context: ./documentation_generator
      dockerfile: Dockerfile
    container_name: documentation-generator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Connect to RAG backend via Docker network
      - RAG_BACKEND_URL=http://rag-backend:8000
      # LLM Provider settings (passed to backend)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      rag-backend:
        condition: service_healthy
    networks:
      - docgen-network
    restart: unless-stopped

networks:
  docgen-network:
    driver: bridge

volumes:
  rag_chroma_data:
    driver: local
